spring:
  # 应用配置
  application:
    name: intelligent-dialogue-platform
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000
  
  # Spring AI OpenAI配置（对接本地大模型）
  ai:
    openai:
      base-url: http://10.8.0.26:6004/v1
      api-key: dev-key
      chat:
        model: gemma_4_31B
  
  # 缓存配置
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1小时

# 本地中间件配置
middleware:
  # Milvus向量数据库
  milvus:
    host: localhost
    port: 19530
  
  # Elasticsearch
  elasticsearch:
    host: localhost
    port: 9200
  
  # 向量模型配置
  embedding:
    base-url: http://10.8.0.26:6003/v1
    api-key: dev-key
    model: bge_m3

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# 日志配置
logging:
  level:
    root: info
    com.agentai: debug